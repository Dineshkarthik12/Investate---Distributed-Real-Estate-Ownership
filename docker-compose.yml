version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - auth-service
      - listing-service
      - token-service
      - investment-service
      - chat-service
      - marketplace-service
      - notification-service
      - file-service

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env

  listing-service:
    build:
      context: .
      dockerfile: services/listing-service/Dockerfile
    ports:
      - "3002:3002"
    env_file: .env

  token-service:
    build:
      context: .
      dockerfile: services/token-service/Dockerfile
    ports:
      - "3003:3003"
    env_file: .env

  investment-service:
    build:
      context: .
      dockerfile: services/investment-service/Dockerfile
    ports:
      - "3004:3004"
    env_file: .env

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    ports:
      - "3005:3005"
    env_file: .env

  marketplace-service:
    build:
      context: .
      dockerfile: services/marketplace-service/Dockerfile
    ports:
      - "3006:3006"
    env_file: .env

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "3007:3007"
    env_file: .env

  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
    ports:
      - "3008:3008"
    env_file: .env
