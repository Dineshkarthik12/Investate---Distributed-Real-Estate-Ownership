name: Deploy Services to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'packages/**'
      - 'Dockerfile.template'
      - '.github/workflows/deploy-services.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (use "all" for all services)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api-gateway
          - auth-service
          - chat-service
          - file-service
          - investment-service
          - listing-service
          - marketplace-service
          - notification-service
          - token-service

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  GAR_LOCATION: us-central1
  REPOSITORY: Investate---Distributed-Real-Estate-Ownership

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine services to deploy
        id: set-services
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.service }}" != "all" ]; then
            echo "services=[\"${{ github.event.inputs.service }}\"]" >> $GITHUB_OUTPUT
          else
            # Automatically find all service directories
            SERVICES_JSON=$(ls -1 services | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "services=$SERVICES_JSON" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    if: ${{ needs.prepare-matrix.outputs.services != '[]' && needs.prepare-matrix.outputs.services != '' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.prepare-matrix.outputs.services) }}
      fail-fast: false # Continue deploying other services if one fails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Recommended way to authenticate with Google Cloud using Workload Identity Federation
      # See: https://github.com/google-github-actions/auth#preferred-setup
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Use Service Account Key (easier for initial setup, but less secure than WIF)
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          
          # For Workload Identity Federation (Uncomment and remove credentials_json to use)
          # workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          # service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth
        run: |-
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Prepare Dockerfile
        run: |
          # Substitute ${SERVICE_NAME} in the template with the current matrix service
          sed "s/\${SERVICE_NAME}/${{ matrix.service }}/g" Dockerfile.template > Dockerfile.${{ matrix.service }}

      - name: Build and Push Container
        run: |-
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}"
          
          docker build -t "$IMAGE" -f Dockerfile.${{ matrix.service }} .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ matrix.service }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            UPSTASH_REDIS_URL=${{ secrets.UPSTASH_REDIS_URL }}
            UPSTASH_REDIS_TOKEN=${{ secrets.UPSTASH_REDIS_TOKEN }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            FROM_EMAIL=${{ secrets.FROM_EMAIL }}
